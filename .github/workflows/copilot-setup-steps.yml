name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup steps work),
# and allow manual runs from the Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # Job MUST be named `copilot-setup-steps` to be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # JDK 17 matches compileOptions / kotlinOptions in app/build.gradle.kts
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            # Install Android SDK (provides sdkmanager, platform-tools, build-tools, etc.)
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            # Cache the Gradle wrapper and downloaded Maven artifacts so that
            # repeat setup-step runs (and the agent itself) skip re-downloading.
            - name: Cache Gradle files
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            # Resolve and download every declared dependency (AGP, Kotlin, AndroidX,
            # Room, Compose BOM, etc.) into ~/.gradle/caches.  The agent can then
            # build offline without needing to reach dl.google.com or maven.org.
            - name: Download Gradle dependencies
              run: ./gradlew dependencies --no-daemon
